<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Campus Connect | Register</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="static/images/favicon.png">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body class="login-page">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light custom-navbar fixed-top">
        <div class="container-fluid">

            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="static/images/logo.png" alt="Logo" class="logo-img">
                <div class="brand-text">
                    <span class="brand-title">CAMPUS CONNECT</span>
                    <span class="brand-tagline">The College Facility Hub</span>
                </div>
            </a>

            <div class="ms-auto">
                <a href="/" class="btn btn-outline-primary me-2 index-btn">Home</a>
            </div>

        </div>
    </nav>

    <!-- REGISTER BOX -->
    <div class="login-wrapper">
        <div class="login-box">

            <h3 class="text-center mb-4 fw-bold"><b>REGISTER</b></h3>

            <form>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" class="form-control" placeholder="Enter your email">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" class="form-control" placeholder="Create password">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="Confirm password">
                </div>

                <button type="submit" class="btn btn-login-primary w-100 mt-3">
                    REGISTER
                </button>
            </form>

            <div class="text-center mt-3 register-text">
                Already have an account?
                <a href="/login" class="register-link">Login</a>
            </div>

        </div>
    </div>

</body>
</html>
