<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Campus Connect | Admin Edit Student</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: black;
        }

        .dashboard-title {
            font-weight: 700;
            font-size: 36px;
            color: white;
            text-align: center;
            margin-top: 130px;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light custom-navbar fixed-top">
    <div class="container-fluid">

        <div class="navbar-brand d-flex align-items-center">
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo-img">
            <div class="brand-text">
                <span class="brand-title">CAMPUS CONNECT</span>
                <span class="brand-tagline">The College Facility Hub</span>
            </div>
        </div>

        <div class="ms-auto">
            <a href="{{ url_for('admin_view_students') }}" class="btn btn-primary me-2"><b>Back</b></a>
        </div>

    </div>
</nav>

<div class="dashboard-title">
    <b>EDIT STUDENT</b>
</div>

<!-- FORM -->
<div class="container d-flex justify-content-center">
    <div class="register-box">
        <form method="POST">

            <div class="row">

                <!-- Full Name -->
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" name="full_name" class="form-control"
                           value="{{ student.name }}" required>
                </div>

                <!-- Email (disabled) -->
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Email (Cannot Edit)</label>
                    <input type="email" class="form-control"
                           value="{{ student.email }}" disabled>
                </div>

                <!-- Contact -->
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Contact No.</label>
                    <input type="tel" name="contact" class="form-control"
                           value="{{ student.contact }}" pattern="[0-9]{10}" required>
                </div>

                <!-- Register No -->
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Register No.</label>
                    <input type="text" name="register_no" class="form-control"
                           value="{{ student.register_no }}" required>
                </div>

                <!-- Programme -->
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Programme</label>
                    <select name="programme" class="form-select" required>
                        <option {% if student.programme=='MCA' %}selected{% endif %}>MCA</option>
                        <option {% if student.programme=='MBA' %}selected{% endif %}>MBA</option>
                        <option {% if student.programme=='B-Tech CS Engineering' %}selected{% endif %}>B-Tech CS Engineering</option>
                        <option {% if student.programme=='B-Tech Mechanical Engineering' %}selected{% endif %}>B-Tech Mechanical Engineering</option>
                        <option {% if student.programme=='B-Tech E&E Engineering' %}selected{% endif %}>B-Tech E&E Engineering</option>
                    </select>
                </div>

                <!-- Semester -->
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Semester</label>
                    <select name="semester" id="semester" class="form-select" required>
                        <option value="" hidden>Select semester</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Password (Cannot Edit)</label>
                    <input type="password" class="form-control"
                           value="********" disabled>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Confirm Password (Cannot Edit)</label>
                    <input type="password" class="form-control"
                           value="********" disabled>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-login-primary px-5">
                    UPDATE STUDENT
                </button>
            </div>

        </form>
    </div>
</div>

<script>
const programme = document.querySelector("select[name='programme']");
const semester = document.getElementById("semester");

// current semester from DB
const currentSem = "{{ student.semester }}";

function loadSemesters() {
    semester.innerHTML = '<option value="" hidden>Select semester</option>';

    let count = (programme.value === "MCA" || programme.value === "MBA") ? 4 : 8;

    for (let i = 1; i <= count; i++) {
        let value = `S${i}`;   // or `Sem ${i}` depending on your choice

        let opt = document.createElement("option");
        opt.value = value;
        opt.textContent = value;

        if (value === currentSem) {
            opt.selected = true;
        }

        semester.appendChild(opt);
    }
}

// load on page open
window.onload = loadSemesters;

// reload when programme changes
programme.addEventListener("change", loadSemesters);
</script>

</body>
</html>
