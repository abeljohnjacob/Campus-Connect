<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Connect | Admin Manage Bookings</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: white;
        }

        .brand-title {
            font-family: 'Poppins', sans-serif;
        }

        .brand-tagline {
            font-family: 'Poppins', sans-serif;
        }

        .dashboard-title {
            font-weight: 700;
            font-size: 36px;
            text-align: center;
            margin-top: 130px;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        /* Glass Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(15px);
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .glass-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-icon {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-icon img {
            width: 80px;   
            height: 80px;
            object-fit: contain;
        }

        .card-icon-big img{
            width: 100px;
            height: 100px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 600;
        }

        .card-text {
            font-size: 14px;
            opacity: 0.8;
        }

        .btn-card {
            margin-top: 20px;
            border-radius: 20px !important;
            padding: 8px 25px;
            font-weight: 500;
            background-color: #03f8f8;
        }

        .btn-card:hover{
            background-color: #035656;
            color: white;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light custom-navbar fixed-top">
    <div class="container-fluid">

        <div class="navbar-brand d-flex align-items-center" href="/">
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo-img">
            <div class="brand-text">
                <span class="brand-title">CAMPUS CONNECT</span>
                <span class="brand-tagline">The College Facility Hub</span>
            </div>
        </div>

        <div class="ms-auto">
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-primary me-2"><b>Back</b></a>
        </div>

    </div>
</nav>

<div class="dashboard-title">
    <b>BOOKING MANAGEMENT</b>
</div>

<!-- CARDS -->
<div class="container manage-wrapper">
    <div class="row justify-content-center g-5">

        <!-- SESSION BOOKINGS CARD -->
        <div class="col-md-5">
            <div class="glass-card text-center">
                <div class="card-icon">
                    <img src="{{ url_for('static', filename='images/session.png') }}" alt="Add">
                </div>
                <div class="card-title"><h5><b>View Session Bookings</b></h5></div>
                <div class="card-text">View, approve or reject session booking requests</div>
                <a href="{{ url_for('admin_session_requests') }}" class="btn btn-info btn-card"><b>Session Bookings</b></a>
            </div>
        </div>

        <!-- EVENT BOOKINGS CARD -->
        <div class="col-md-5">
            <div class="glass-card text-center">
                <div class="card-icon-big">
                    <img src="{{ url_for('static', filename='images/event.png') }}" alt="View">
                </div>
                <div class="card-title"><h5><b>View Event Bookings</b></h5></div>
                <div class="card-text">View, approve or reject event booking requests</div>
                <a href="{{ url_for('admin_event_requests') }}" class="btn btn-info btn-card"><b>Event Bookings</b></a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
