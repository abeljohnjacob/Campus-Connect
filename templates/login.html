<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Campus Connect | Login</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="static/images/favicon.png">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body class="login-page">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light custom-navbar fixed-top">
        <div class="container-fluid">

            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="static/images/logo.png" alt="Logo" class="logo-img">
                <div class="brand-text">
                    <span class="brand-title">CAMPUS CONNECT</span>
                    <span class="brand-tagline">The College Facility Hub</span>
                </div>
            </a>

            <div class="ms-auto">
                <a href="/" class="btn btn-outline-primary me-2 index-btn">Home</a>
            </div>

        </div>
    </nav>

    <!-- LOGIN SECTION -->
    <div class="login-wrapper">
        <div class="login-box">

            <h3 class="text-center mb-4 fw-bold">LOGIN</h3>

            <!-- ✅ FORM CONNECTED TO FLASK -->
            <form method="POST" action="/login">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Enter your email"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter your password"
                        required>
                </div>

                <button type="submit" class="btn btn-login-primary w-100 mt-3">
                    LOGIN
                </button>
            </form>

            <div class="text-center mt-3 register-text">
                Don’t have an account?
                <a href="/register" class="register-link">Register</a>
            </div>

        </div>
    </div>

</body>
</html>
