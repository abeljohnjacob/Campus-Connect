<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Connect | Student Chatpage</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        .brand-title{
            font-family: 'Poppins', sans-serif;
        }
        
        .brand-tagline {
            font-family: 'Poppins', sans-serif;
        }

        .chat-container {
            max-width: 900px;
            margin: 100px auto 20px;
            background: #efeae2;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .chat-header {
            background: #0b7e70;
            color: white;
            padding: 15px;
            font-weight: 700;
            font-size: 17px;
        }

        .chat-box {
            height: 480px;
            overflow-y: auto;
            padding: 20px;
            background: url('https://www.transparenttextures.com/patterns/cubes.png');
        }

        .msg {
            display: flex;
            margin-bottom: 12px;
        }

        .msg-left {
            justify-content: flex-start;
        }

        .msg-right {
            justify-content: flex-end;
        }

        .bubble {
            max-width: 65%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .bubble-left {
            background: white;
            border-top-left-radius: 0;
        }

        .bubble-right {
            background: #b6f785;
            border-top-right-radius: 0;
        }

        .chat-input {
            background: #f0f0f0;
            padding: 10px;
        }

        .chat-input input {
            border-radius: 20px;
            padding: 10px 15px;
        }

        .chat-input button {
            border-radius: 50%;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #25d366, #128c7e);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(37, 211, 102, 0.4);
            transition: all 0.25s ease;
        }

        .chat-input button i {
            color: white;
            font-size: 18px;
        }

        .chat-input button:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.5);
        }

        .chat-input button:active {
            transform: scale(0.92);
        }
    </style>
</head>

<body>

<!-- NAVBAR (UNCHANGED) -->
<nav class="navbar navbar-expand-lg navbar-light custom-navbar fixed-top">
    <div class="container-fluid">

        <div class="navbar-brand d-flex align-items-center" href="/">
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo-img">
            <div class="brand-text">
                <span class="brand-title">CAMPUS CONNECT</span>
                <span class="brand-tagline">The College Facility Hub</span>
            </div>
        </div>

        <div class="ms-auto">
            <a href="{{ url_for('student_chatspace') }}" class="btn btn-primary me-2"><b>Back</b></a>
        </div>

    </div>
</nav>

<div class="chat-container">

    <!-- Chat Header -->
    <div class="chat-header">
        <span>
            <i class="bi bi-person-badge me-2" style="font-size: 20px;"></i>{{ faculty.name }}
        </span>
    </div>

    <!-- Messages -->
    <div class="chat-box">
        {% for m in messages %}
            {% if m.sender_role == "student" %}
                <div class="msg msg-right">
                    <div class="bubble bubble-right">
                        {{ m.message }}
                    </div>
                </div>
            {% else %}
                <div class="msg msg-left">
                    <div class="bubble bubble-left">
                        {{ m.message }}
                    </div>
                </div>
            {% endif %}
        {% endfor %}
    </div>

    <!-- Input -->
    <form method="POST" class="chat-input">
        <div class="d-flex gap-2">
            <input type="text" name="message" class="form-control" placeholder="Type a message..." required>

            <button type="submit">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>
    </form>
</div>

</body>
</html>
