<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Campus Connect | Admin Add Faculty</title>

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: black;
        }

        .dashboard-title {
            font-weight: 700;
            font-size: 36px;
            color: white;
            text-align: center;
            margin-top: 130px;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        /* File input styling */
        input[type="file"] {
            background-color: white;
            border: 1px solid #cfd4da;
        }

        input[type="file"]::file-selector-button {
            background-color: #c0c0c0;
            border: 1px solid #cfd4da;
            padding: 6px 12px;
            margin-right: 10px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: #dad3cfc5;
        }

        /* HOD checkbox spacing */
        .hod-section {
            margin-top: 10px;
        }

        .form-check-input {
            border: 2px solid #867e7e;   /* thickness + color */
        }

        .form-check-input:checked {
            border: 2px solid #333;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light custom-navbar fixed-top">
    <div class="container-fluid">

        <div class="navbar-brand d-flex align-items-center">
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo-img">
            <div class="brand-text">
                <span class="brand-title">CAMPUS CONNECT</span>
                <span class="brand-tagline">The College Facility Hub</span>
            </div>
        </div>

        <div class="ms-auto">
            <a href="{{ url_for('admin_manage_faculties') }}" class="btn btn-primary me-2"><b>Back</b></a>
        </div>

    </div>
</nav>

<div class="dashboard-title">
    <b>ADD FACULTY</b>
</div>

<!-- FORM -->
<div class="container d-flex justify-content-center">
    <div class="register-box">
        
        <form method="POST" enctype="multipart/form-data">
            <div class="row">
                
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" name="full_name" class="form-control" placeholder="Enter faculty name" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Contact No.</label>
                    <input type="tel" name="contact" class="form-control" placeholder="Enter contact number" pattern="[0-9]{10}" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Register No.</label>
                    <input type="text" name="register_no" class="form-control" placeholder="Enter register number" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Department</label>
                    <select name="department" class="form-select" required>
                        <option value="" hidden selected>Select department</option>
                        <option>MCA</option>
                        <option>MBA</option>
                        <option>B-Tech CS Engineering</option>
                        <option>B-Tech Mechanical Engineering</option>
                        <option>B-Tech E&E Engineering</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Designation</label>
                    <select name="designation" class="form-select" required>
                        <option value="" hidden selected>Select designation</option>
                        <option>Professor</option>
                        <option>Associate Professor</option>
                        <option>Senior Assistant Professor</option>
                        <option>Assistant Professor</option>
                        <option>Lab Staff</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Upload Photo</label>
                    <input type="file" name="photo" class="form-control" accept="image/*" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create password" required>
                </div>
            </div>

            <!-- HOD Section -->
            <div class="text-center hod-section">
                <div class="d-flex justify-content-center align-items-center gap-3">

                    <label class="form-label fw-semibold mb-0">HOD?</label>

                    <div class="form-check">
                        <input class="form-check-input hod-check" type="checkbox" name="is_hod" value="Yes" id="hodYes">
                        <label class="form-check-label" for="hodYes">Yes</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input hod-check" type="checkbox" name="is_hod" value="No" id="hodNo">
                        <label class="form-check-label" for="hodNo">No</label>
                    </div>

                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-login-primary px-5">
                    ADD FACULTY
                </button>
            </div>

        </form>

    </div>
</div>

<!-- JS for single checkbox selection + toggle -->
<script>
    const checkboxes = document.querySelectorAll('.hod-check');

    checkboxes.forEach(box => {
        box.addEventListener('click', function () {

            if (this.checked) {
                checkboxes.forEach(cb => {
                    if (cb !== this) cb.checked = false;
                });
            }
        });
    });
</script>

</body>
</html>
