<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Campus Connect | Admin Edit Event</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: black;
        }

        .dashboard-title {
            font-weight: 700;
            font-size: 36px;
            color: white;
            text-align: center;
            margin-top: 130px;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        textarea {
            resize: none;
            height: 120px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light custom-navbar fixed-top">
    <div class="container-fluid">

        <div class="navbar-brand d-flex align-items-center">
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo-img">
            <div class="brand-text">
                <span class="brand-title">CAMPUS CONNECT</span>
                <span class="brand-tagline">The College Facility Hub</span>
            </div>
        </div>

        <div class="ms-auto">
            <a href="{{ url_for('admin_view_events') }}" class="btn btn-primary me-2">
                <b>Back</b>
            </a>
        </div>

    </div>
</nav>

<div class="dashboard-title">
    <b>EDIT EVENT</b>
</div>

<!-- FORM -->
<div class="container d-flex justify-content-center">
    <div class="register-box">

        <form method="POST">
            <div class="row">

                <!-- EVENT TITLE -->
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Event Title</label>
                    <input type="text" name="event_title" class="form-control"
                           value="{{ event.event_title }}" required>
                </div>

                <!-- ORGANIZER -->
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Organizer</label>
                    <input type="text" name="organizer" class="form-control"
                           value="{{ event.organizer }}" required>
                </div>
            </div>

            <!-- DESCRIPTION -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Description</label>
                <textarea name="description" class="form-control" required>{{ event.description }}</textarea>
            </div>

            <div class="row">

                <!-- START DATE -->
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Start Date</label>
                    <input type="date" name="start_date" id="start_date"
                           class="form-control"
                           value="{{ event.start_date }}" required>
                </div>

                <!-- END DATE -->
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">End Date</label>
                    <input type="date" name="end_date" id="end_date"
                           class="form-control"
                           value="{{ event.end_date }}" required>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-login-primary px-5">
                    UPDATE EVENT
                </button>
            </div>

        </form>

    </div>
</div>

<script>
// optional restriction like add page
const today = new Date().toISOString().split("T")[0];

document.getElementById("start_date").setAttribute("min", today);
document.getElementById("end_date").setAttribute("min", today);
</script>

</body>
</html>
