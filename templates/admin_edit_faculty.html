<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Campus Connect | Admin Edit Faculty</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: black;
        }

        .dashboard-title {
            font-weight: 700;
            font-size: 36px;
            color: white;
            text-align: center;
            margin-top: 130px;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        /* file input styling */
        input[type="file"] {
            background-color: white;
            border: 1px solid #cfd4da;
        }

        input[type="file"]::file-selector-button {
            background-color: #c0c0c0;
            border: 1px solid #cfd4da;
            padding: 6px 12px;
            margin-right: 10px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: #dad3cfc5;
        }

        .hod-section {
            margin-top: 10px;
        }

        /* thicker checkbox border */
        .form-check-input {
            border: 2px solid #867e7e;
        }

        .form-check-input:checked {
            border: 2px solid #333;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light custom-navbar fixed-top">
    <div class="container-fluid">

        <div class="navbar-brand d-flex align-items-center">
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo-img">
            <div class="brand-text">
                <span class="brand-title">CAMPUS CONNECT</span>
                <span class="brand-tagline">The College Facility Hub</span>
            </div>
        </div>

        <div class="ms-auto">
            <a href="{{ url_for('admin_view_faculties') }}" class="btn btn-primary me-2"><b>Back</b></a>
        </div>

    </div>
</nav>

<div class="dashboard-title">
    <b>EDIT FACULTY</b>
</div>

<!-- FORM -->
<div class="container d-flex justify-content-center">
    <div class="register-box">
        <form method="POST" enctype="multipart/form-data">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" name="full_name" class="form-control"
                           value="{{ faculty.name }}" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Email (Cannot Edit)</label>
                    <input type="email" class="form-control"
                           value="{{ faculty.email }}" disabled>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Contact No.</label>
                    <input type="tel" name="contact" class="form-control"
                           value="{{ faculty.contact }}" pattern="[0-9]{10}" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Register No.</label>
                    <input type="text" name="register_no" class="form-control"
                           value="{{ faculty.register_no }}" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Department</label>
                    <select name="department" class="form-select" required>
                        <option {% if faculty.department=='MCA' %}selected{% endif %}>MCA</option>
                        <option {% if faculty.department=='MBA' %}selected{% endif %}>MBA</option>
                        <option {% if faculty.department=='B-Tech CS Engineering' %}selected{% endif %}>B-Tech CS Engineering</option>
                        <option {% if faculty.department=='B-Tech Mechanical Engineering' %}selected{% endif %}>B-Tech Mechanical Engineering</option>
                        <option {% if faculty.department=='B-Tech Civil Engineering' %}selected{% endif %}>B-Tech Civil Engineering</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Designation</label>
                    <select name="designation" class="form-select" required>
                        <option value="Professor" {% if faculty.designation=="Professor" %}selected{% endif %}>Professor</option>
                        <option value="Associate Professor" {% if faculty.designation=="Associate Professor" %}selected{% endif %}>Associate Professor</option>
                        <option value="Senior Assistant Professor" {% if faculty.designation=="Senior Assistant Professor" %}selected{% endif %}>Senior Assistant Professor</option>
                        <option value="Assistant Professor" {% if faculty.designation=="Assistant Professor" %}selected{% endif %}>Assistant Professor</option>
                        <option value="Lab Staff" {% if faculty.designation=="Lab Staff" %}selected{% endif %}>Lab Staff</option>
                    </select>
                </div>

                <!-- PHOTO FIELD -->
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Photo</label>
                    <input type="file" name="photo" id="photoInput" class="form-control">
                    {% if faculty.photo %}
                        <small class="text-muted">
                            Current file: <span id="currentPhotoName">{{ faculty.photo }}</span>
                        </small>
                    {% endif %}
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Password (Cannot Edit)</label>
                    <input type="password" class="form-control"
                           value="********" disabled>
                </div>

            </div>

            <!-- HOD Section -->
            <div class="text-center hod-section">
                <div class="d-flex justify-content-center align-items-center gap-3">

                    <label class="form-label fw-semibold mb-0">HOD?</label>

                    <div class="form-check">
                        <input class="form-check-input hod-check" type="checkbox"
                               name="is_hod" value="Yes" id="hodYes"
                               {% if faculty.isHOD=='Yes' %}checked{% endif %}>
                        <label class="form-check-label" for="hodYes">Yes</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input hod-check" type="checkbox"
                               name="is_hod" value="No" id="hodNo"
                               {% if faculty.isHOD=='No' %}checked{% endif %}>
                        <label class="form-check-label" for="hodNo">No</label>
                    </div>

                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-login-primary px-5">
                    UPDATE FACULTY
                </button>
            </div>

        </form>
    </div>
</div>

<!-- JS: single checkbox + filename update -->
<script>
const checkboxes = document.querySelectorAll('.hod-check');

checkboxes.forEach(box => {
    box.addEventListener('click', function () {
        if (this.checked) {
            checkboxes.forEach(cb => {
                if (cb !== this) cb.checked = false;
            });
        }
    });
});

// update filename when new file selected
const photoInput = document.getElementById("photoInput");
const nameSpan = document.getElementById("currentPhotoName");

if (photoInput) {
    photoInput.addEventListener("change", function () {
        if (this.files.length > 0 && nameSpan) {
            nameSpan.textContent = this.files[0].name;
        }
    });
}
</script>

</body>
</html>
